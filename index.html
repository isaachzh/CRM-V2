<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Isaac CRM Pro</title>
<!-- Firebase compat (non-module, loads normally) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#080808;--card:#111;--card2:#1c1c1c;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#909090;--radius:13px;
  --font:'Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--font);outline:none;border:none;color:var(--text)}
a{text-decoration:none;color:inherit}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform}
.screen.hidden{transform:translateX(100%);pointer-events:none}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px}
.scroll::-webkit-scrollbar{display:none}
.topbar{display:flex;align-items:center;gap:10px;padding:50px 14px 13px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tb-title{font-size:1.05rem;font-weight:800;flex:1;letter-spacing:-.01em}
.tb-sub{font-size:0.67rem;color:var(--muted);margin-top:1px}
.back-btn{width:32px;height:32px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border);color:var(--text)}
.btn{padding:9px 15px;border-radius:9px;font-weight:700;font-size:0.82rem;transition:opacity .12s}
.btn:active{opacity:.7}
.btn-w{background:#fff;color:#000}
.btn-sm{padding:5px 11px;font-size:0.74rem;border-radius:8px}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:#7f1d1d;color:#fca5a5}
.btn-full{width:100%;text-align:center;display:block;padding:11px}
.btn-green{background:#15803d;color:#dcfce7}
.inp{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:0.82rem;width:100%}
.inp::placeholder{color:var(--muted)}
.inp:focus{border-color:#555}
textarea.inp{resize:none;height:78px;line-height:1.55}
.card{background:var(--card);border-radius:var(--radius);padding:13px;border:1px solid var(--border);margin-bottom:9px}
.card-h{font-size:0.64rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.s-new{background:#2a2a2a;color:#aaa}.s-maybe{background:#0e7490;color:#cff4fc}.s-alreadyhave{background:#1e3a8a;color:#bfdbfe}
.s-interested{background:#6d28d9;color:#ede9fe}.s-seenprice{background:#a16207;color:#fef9c3}
.s-2interested{background:#c2410c;color:#ffedd5}.s-3interested{background:#991b1b;color:#fee2e2}
.s-maybeinfuture{background:#065f46;color:#d1fae5}.s-2seenprice{background:#92400e;color:#fef3c7}
.s-3seenprice{background:#7f1d1d;color:#fecaca}.s-finalmessage{background:#292524;color:#a8a29e}
.s-rejected{background:#78350f;color:#fed7aa}.s-closed{background:#14532d;color:#bbf7d0}
.status-badge{font-size:0.6rem;font-weight:800;padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.status-pill{padding:5px 11px;border-radius:20px;font-size:0.7rem;font-weight:700;cursor:pointer;opacity:.4;border:1.5px solid transparent;transition:all .12s;margin-bottom:5px}
.status-pill.active{opacity:1;border-color:rgba(255,255,255,.3)}
.nav{display:flex;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-item{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--muted);font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;transition:color .12s}
.nav-item.active{color:#fff}
.nav-item svg{width:18px;height:18px}

/* ── PIPELINE ROW ── */
.pipe-row{display:flex;gap:9px;margin-bottom:10px}
.pipe-main{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px;flex:6}
.pipe-credit{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px;flex:4;cursor:pointer;transition:border-color .15s}
.pipe-credit:active{opacity:.8}
.pipe-credit.c-orange{border-color:#ea580c}
.pipe-credit.c-red{border-color:#dc2626}
.pipe-amt{font-size:1.6rem;font-weight:900;line-height:1.1}
.pipe-lbl{font-size:0.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.pipe-sub{font-size:0.62rem;color:var(--muted);margin-top:3px}
.credit-val{font-size:1.15rem;font-weight:900;line-height:1.2}
.credit-reset{font-size:0.59rem;color:var(--muted);margin-top:2px;line-height:1.4}

/* ── DUE/OVERDUE ROW ── */
.due-row{display:flex;gap:9px;margin-bottom:10px}
.due-stat{flex:1;border-radius:var(--radius);padding:12px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.due-stat:active{opacity:.8}
.due-stat-n{font-size:1.5rem;font-weight:900;line-height:1}
.due-stat-l{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.ds-today{background:rgba(255,0,0,.08);border-color:rgba(255,0,0,.3)}
.ds-today .due-stat-n{color:#ff4444}
.ds-today .due-stat-l{color:rgba(255,68,68,.7)}
.ds-overdue{background:rgba(254,0,255,.07);border-color:rgba(254,0,255,.3)}
.ds-overdue .due-stat-n{color:#fe00ff}
.ds-overdue .due-stat-l{color:rgba(254,0,255,.7)}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.stat-c{background:var(--card);border-radius:var(--radius);padding:12px;border:1px solid var(--border)}
.stat-n{font-size:1.65rem;font-weight:900;line-height:1}
.stat-l{font-size:0.62rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}

/* ── BIZ CARDS ── */
.biz-card{background:var(--card);border-radius:var(--radius);padding:11px 13px;border:1px solid var(--border);margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:filter .1s;user-select:none;-webkit-user-select:none;position:relative}
.biz-card:active{filter:brightness(1.2)}
.biz-avatar{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.88rem;flex-shrink:0;color:#000}
.biz-info{flex:1;min-width:0}
.biz-name{font-weight:700;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.biz-meta{font-size:0.67rem;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.prog-bar{height:2px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;background:rgba(255,255,255,.6);border-radius:2px;transition:width .4s}
.mini-cap{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:0.58rem;font-weight:800;flex-shrink:0;white-space:nowrap;color:#000}
.due-chip{font-size:0.58rem;font-weight:800;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,.15);color:#fff;flex-shrink:0}

/* ── BANNERS ── */
.banner{border-radius:10px;padding:9px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.banner-red{background:rgba(185,28,28,.1);border:1px solid rgba(185,28,28,.25)}
.banner-orange{background:rgba(234,88,12,.08);border:1px solid rgba(234,88,12,.22)}
.banner-purple{background:rgba(168,0,255,.08);border:1px solid rgba(168,0,255,.25)}
.banner p{font-size:0.74rem;font-weight:700}
.banner-red p{color:#f87171}
.banner-orange p{color:#fb923c}
.banner-purple p{color:#d946ef}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pls 1.4s infinite}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.5)}}
.srch-wrap{position:relative;margin-bottom:8px}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.srch-inp{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:8px 12px 8px 32px;color:var(--text);font-size:0.82rem;width:100%}
.srch-inp::placeholder{color:var(--muted)}
.ftabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:9px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:4px 10px;border-radius:20px;font-size:0.68rem;font-weight:700;white-space:nowrap;cursor:pointer;flex-shrink:0;border:1.5px solid transparent;transition:all .15s;display:flex;align-items:center;gap:4px}
.det-hdr{padding:48px 14px 13px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.det-name{font-size:1.1rem;font-weight:800;margin-bottom:2px}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.act-btn{padding:12px;border-radius:10px;font-weight:700;font-size:0.87rem;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}
.act-wa-msg{background:#1d4ed8;color:#bfdbfe;border:none}
.act-wa-call{background:#15803d;color:#dcfce7;border:none}
.tl{display:flex;flex-direction:column;gap:6px}
.tl-item{display:flex;gap:8px;align-items:flex-start}
.tl-dot{width:5px;height:5px;border-radius:50%;background:#444;flex-shrink:0;margin-top:5px}
.tl-txt{font-size:0.77rem;color:#b0b0b0;line-height:1.5;flex:1;word-break:break-word}
.tl-time{font-size:0.63rem;color:#555;flex-shrink:0}
.flt{position:fixed;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 2px 14px rgba(0,0,0,.7);transition:transform .12s}
.flt:active{transform:scale(.9)}
.flt-ai{bottom:82px;right:15px;background:#fff}
.flt-tmpl{bottom:26px;right:15px;background:var(--card2);border:1px solid var(--border)}
.sbd{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.sbd.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:92vh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sh-handle{width:32px;height:3px;border-radius:2px;background:var(--border);margin:9px auto;flex-shrink:0}
.sh-hdr{padding:2px 14px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.sh-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sh-hdr h3{font-size:0.92rem;font-weight:800}
.sh-hdr p{font-size:0.7rem;color:var(--muted);margin-top:2px}
.sh-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px;flex:1}
.sh-scroll::-webkit-scrollbar{display:none}
.sit-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:11px;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.sit-tabs::-webkit-scrollbar{display:none}
.sit-tab{padding:5px 10px;border-radius:18px;font-size:0.68rem;font-weight:700;white-space:nowrap;background:var(--card2);color:var(--muted);cursor:pointer;flex-shrink:0;border:1px solid transparent;transition:all .12s}
.sit-tab.active{background:#fff;color:#000}
.tmpl-block{margin-bottom:13px;border:1px solid var(--border);border-radius:11px;overflow:hidden}
.tmpl-lang-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--card2);border-bottom:1px solid var(--border)}
.lang-badge{font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:7px}
.lang-en{background:rgba(0,180,216,.12);color:#00b4d8}
.lang-bm{background:rgba(74,222,128,.1);color:#4ade80}
.tmpl-msg{padding:10px 12px;font-size:0.77rem;line-height:1.68;cursor:pointer;white-space:pre-wrap;word-break:break-word;color:var(--text)}
.tmpl-msg:active{background:var(--card2)}
.tmpl-textarea{padding:10px 12px;font-size:0.77rem;line-height:1.68;background:var(--card2);color:var(--text);width:100%;resize:none;height:180px;border:none}
.tmpl-save-row{display:flex;gap:6px;padding:7px 11px;background:var(--card2);border-top:1px solid var(--border)}
.edited-badge{font-size:0.58rem;font-weight:800;padding:1px 5px;border-radius:6px;background:rgba(34,197,94,.15);color:#22c55e}
.out-btn{display:block;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.out-btn:active{transform:scale(.98)}
.out-icon{font-size:1.2rem;margin-bottom:2px}
.out-lbl{font-weight:700;font-size:0.84rem;margin-bottom:1px;color:var(--text)}
.out-desc{font-size:0.68rem;color:var(--muted)}
.ob-green{border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.05)}
.ob-blue{border-color:rgba(30,58,138,.5);background:rgba(30,58,138,.07)}
.ob-orange{border-color:rgba(234,88,12,.4);background:rgba(234,88,12,.05)}
.ob-red{border-color:rgba(185,28,28,.4);background:rgba(185,28,28,.05)}
.ob-purple{border-color:rgba(109,40,217,.4);background:rgba(109,40,217,.05)}
.ob-yellow{border-color:rgba(202,138,4,.4);background:rgba(202,138,4,.05)}
.ob-gray{border-color:rgba(100,100,100,.3);background:rgba(100,100,100,.04)}
.due-box{border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;border:1px solid var(--border);background:var(--card2)}
.due-box.overdue{border-color:rgba(254,0,255,.5);background:rgba(254,0,255,.07)}
.due-box.today{border-color:rgba(255,0,0,.5);background:rgba(255,0,0,.07)}
.due-box.soon{border-color:rgba(202,138,4,.5);background:rgba(202,138,4,.06)}
.chat-ov{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;flex-direction:column}
.chat-ov.hidden{display:none}
.chat-hdr{padding:50px 14px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-msgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:9px}
.chat-msgs::-webkit-scrollbar{display:none}
.cmsg{max-width:84%;padding:8px 12px;border-radius:13px;font-size:0.79rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.cmsg-u{background:#fff;color:#000;align-self:flex-end;border-bottom-right-radius:3px}
.cmsg-a{background:var(--card2);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px;border:1px solid var(--border)}
.typing{display:flex;gap:3px;align-items:center;padding:3px 0}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:td 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chat-bar{padding:10px 13px;border-top:1px solid var(--border);display:flex;gap:7px;background:var(--bg);flex-shrink:0}
.chat-inp{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:8px 13px;color:var(--text);font-size:0.81rem;flex:1}
.chat-inp::placeholder{color:var(--muted)}
.chat-send{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sug-row{display:flex;gap:5px;overflow-x:auto;padding:0 13px 8px;-webkit-overflow-scrolling:touch;flex-shrink:0}
.sug-row::-webkit-scrollbar{display:none}
.sug-chip{padding:5px 10px;border-radius:18px;font-size:0.68rem;font-weight:700;white-space:nowrap;background:var(--card2);color:var(--muted);cursor:pointer;flex-shrink:0;border:1px solid var(--border)}
.price-norm{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.price-ni{background:var(--card2);border-radius:8px;padding:9px 11px;border:1px solid var(--border)}
.price-promo{background:#fff;color:#000;border-radius:11px;padding:13px}
.price-big{font-size:1.75rem;font-weight:900}
.price-mid{font-size:1.1rem;font-weight:800}
.stk{text-decoration:line-through;color:#888;font-size:0.82rem}
.wk-chart{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:4px}
.wk-col{text-align:center}
.wk-lbl{font-size:0.57rem;color:var(--muted);margin-bottom:4px}
.wk-bar{height:44px;background:var(--card2);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.wk-fill{width:100%;border-radius:4px;min-height:3px}
.wk-num{font-size:0.6rem;font-weight:700;margin-top:3px;color:var(--muted)}
.tracker-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.tracker-num{font-size:1.3rem;font-weight:900;cursor:pointer;min-width:32px;text-align:center}
.reorder-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--card2);border-radius:10px;margin-bottom:6px;border:1px solid var(--border)}
.reorder-arrows{display:flex;flex-direction:column;gap:2px}
.arrow-btn{width:22px;height:22px;border-radius:6px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.7rem;cursor:pointer;transition:all .12s}
.arrow-btn:active{background:var(--border)}
.op-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card2);border-radius:10px;margin-bottom:6px;border:1px solid var(--border)}
.op-label{font-size:0.8rem;font-weight:700}
.op-sub{font-size:0.65rem;color:var(--muted);margin-top:1px}
input[type=range]{-webkit-appearance:none;width:90px;height:4px;border-radius:2px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;cursor:pointer}
.color-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card2);border-radius:10px;margin-bottom:5px;border:1px solid var(--border)}
.color-swatch{width:28px;height:28px;border-radius:7px;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
.acc-card{background:var(--card2);border-radius:11px;padding:11px 13px;border:1px solid var(--border);margin-bottom:8px}
.acc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.acc-name{font-weight:700;font-size:0.87rem}
.acc-credits{font-size:1.3rem;font-weight:900}
.acc-meta{font-size:0.65rem;color:var(--muted);margin-top:2px}
.acc-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.acc-selected{border-color:#22c55e!important;box-shadow:0 0 0 1px #22c55e33}
.netlify-popup{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:500;opacity:0;pointer-events:none;transition:opacity .18s;display:flex;align-items:flex-end;justify-content:center;padding:20px}
.netlify-popup.open{opacity:1;pointer-events:all}
.netlify-inner{background:var(--card);width:100%;max-width:380px;border:1px solid var(--border);max-height:80vh;display:flex;flex-direction:column;border-radius:20px}
.netlify-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.netlify-hdr h3{font-size:0.92rem;font-weight:800}
.netlify-body{overflow-y:auto;padding:13px;flex:1}

/* ── HOURS PASTE AREA ── */
.hours-paste{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:0.78rem;width:100%;height:120px;resize:none;line-height:1.6}
.hours-paste::placeholder{color:var(--muted)}
.hours-preview{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.hours-day-row{display:flex;align-items:center;gap:7px;font-size:0.72rem}
